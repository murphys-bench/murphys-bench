<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Murphy's Bench{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tf-input {
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            line-height: 1.5;
            color: #111827;
            background-color: #fff;
        }
        .tf-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }
        select.tf-input { background-image: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[600px] mx-auto">
        <div class="text-center mb-6">
            {% if site_settings.login_logo %}
                <a href="/"><img src="{{ site_settings.login_logo.url }}" alt="{{ site_settings.company_name|default:'Murphy&#39;s Bench' }}"
                                 style="display:inline-block;max-width:100%;max-height:560px;width:auto;height:auto;"></a>
            {% else %}
                <a href="/" class="text-2xl font-bold text-gray-900 hover:text-gray-700">🔧 Murphy's Bench</a>
            {% endif %}
        </div>
        <div class="bg-white rounded-lg shadow-md p-8 max-w-md mx-auto">
            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 px-4 py-3 rounded text-sm
                        {% if message.tags == 'error' %}bg-red-50 text-red-700 border border-red-200
                        {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
