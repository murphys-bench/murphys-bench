name: CI

# The gate: run the test spine + Django checks automatically on every change,
# so broken code is caught here instead of in production. Mirrors prod (Python
# 3.12, SQLite). Green = the 102-test suite and Django checks pass.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create runtime directories
        # Django's logging opens logs/murphys_bench.log at startup and won't
        # create the parent dir — every manage.py command fails without this.
        run: mkdir -p logs media protected

      - name: Generate ephemeral keys
        # Settings refuse to start with the default keys when DEBUG=False
        # (the production safety guard). These are throwaway, per-run, CI-only.
        run: |
          echo "SECRET_KEY=$(python -c 'from django.core.management.utils import get_random_secret_key; print(get_random_secret_key())')" >> "$GITHUB_ENV"
          echo "FIELD_ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> "$GITHUB_ENV"

      - name: Django system checks
        # Plain check (not --deploy) so green means green — --deploy would flag
        # the deliberate HTTPS-on-LAN warnings and make CI perpetually yellow.
        run: python manage.py check

      - name: Run tests
        run: python -m pytest
