name: Scheduled Dependency Audit

# CI's pip-audit gate only runs when something is pushed — if the repo goes
# quiet for a few weeks, a newly-disclosed CVE in a pinned dependency could
# sit unnoticed. This runs pip-audit on a weekly timer regardless of push
# activity, and opens a GitHub issue (which emails watchers) on failure so
# there's always a way to find out without anyone needing to check Actions.

on:
  schedule:
    - cron: '0 13 * * 1'  # Monday 13:00 UTC
  workflow_dispatch: {}  # manual "Run workflow" button for an on-demand check

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: CVE gate (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Open an issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Scheduled dependency audit failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              'The weekly pip-audit run found a known vulnerability in a pinned dependency.',
              '',
              `See the failed run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              'Fix: bump the flagged package in requirements.txt, run the test suite, and push.',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security'],
            });
