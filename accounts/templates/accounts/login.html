{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Murphy's Bench</title>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="w-full max-w-md">

        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <p class="text-4xl mb-3">🔧</p>
            <h1 class="text-3xl font-bold text-gray-900">Murphy's Bench</h1>
            <p class="text-gray-500 mt-1">Sign in to your account</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-lg shadow-md p-8">

            {% if messages %}
                {% for message in messages %}
                    <div class="mb-4 px-4 py-3 rounded bg-red-100 text-red-700 text-sm">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        autofocus
                        required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    >
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        required
                        class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-md shadow focus:outline-none focus:ring-2 focus:ring-blue-500">
                    Sign In
                </button>
            </form>
        </div>

        <p class="text-center text-gray-400 text-xs mt-6">{{ site_settings.company_name|default:"Murphy's Bench" }} — Internal Use Only</p>
    </div>

</body>
</html>
