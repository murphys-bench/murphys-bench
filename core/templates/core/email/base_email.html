<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ subject }}</title>
</head>
<body style="margin:0;padding:0;background-color:#f1f5f9;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#1f2937;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#f1f5f9;padding:24px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width:600px;width:100%;">

          <!-- Header / Logo bar -->
          <tr>
            <td style="background-color:{{ title_bar_color }};padding:20px 32px;border-radius:8px 8px 0 0;">
              <span style="font-size:20px;font-weight:bold;color:{{ title_text_color }};">{{ company_name }}</span>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td style="background-color:#ffffff;padding:32px;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;">
              <div style="font-size:15px;line-height:1.6;color:#1f2937;white-space:pre-line;">{{ body }}</div>
            </td>
          </tr>

          <!-- Signature -->
          {% if signature %}
          <tr>
            <td style="background-color:#ffffff;padding:0 32px 28px;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;">
              <hr style="border:none;border-top:1px solid #e2e8f0;margin:0 0 20px;">
              <div style="font-size:13px;line-height:1.6;color:#4b5563;white-space:pre-line;">{{ signature }}</div>
            </td>
          </tr>
          {% endif %}

          <!-- Footer -->
          <tr>
            <td style="background-color:#f8fafc;padding:16px 32px;border:1px solid #e2e8f0;border-radius:0 0 8px 8px;">
              <p style="margin:0;font-size:12px;color:#9ca3af;text-align:center;">
                This email was sent by {{ company_name }}.
                {% if ticket_number %}Please reference ticket <strong>{{ ticket_number }}</strong> in any reply.{% endif %}
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
