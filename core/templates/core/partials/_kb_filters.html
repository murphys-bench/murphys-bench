<label class="text-sm text-gray-600">Category</label>
<select name="category" class="px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
    <option value="">All categories</option>
    {% for cat in categories %}
        <option value="{{ cat.pk }}" {% if selected_category == cat.pk|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
    {% endfor %}
</select>
<label class="text-sm text-gray-600 ml-1">Type</label>
<select name="type" class="px-3 py-1.5 text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white">
    <option value="">All types</option>
    {% for val, label in article_types %}
        <option value="{{ val }}" {% if selected_type == val %}selected{% endif %}>{{ label }}</option>
    {% endfor %}
</select>
