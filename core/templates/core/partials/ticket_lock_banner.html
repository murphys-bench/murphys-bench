{% if lock_user %}
<div id="lock-banner" class="bg-yellow-50 border border-yellow-300 rounded-md px-4 py-3 mb-4 text-sm text-yellow-800">
    {% load mb_icons %}<span class="inline-flex items-center gap-2">{% icon "exclamation-triangle" 4 %} <strong>{{ lock_user.get_full_name|default:lock_user.username }}</strong> is currently viewing this ticket.</span>
</div>
{% else %}
<div id="lock-banner"></div>
{% endif %}
